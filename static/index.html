<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POS</title>
<link rel="stylesheet" href="css/pos.css?v=55">
</head>
<body>
<div id="app">
  <nav>
    <img class="nav-logo" src="img/logo.png?v=55" alt="膜型機品牌標誌">
    <button v-for="[key, label] in pages" :key="key"
            :class="{active: page===key}" @click="page=key">{{ label }}</button>
  </nav>
  <div class="error-bar" v-if="error">{{ error }}</div>
  <component :is="'page-' + page"></component>
</div>
<!-- 各頁模板集中於此,由各 js 以 template: '#tpl-xxx' 引用 -->
<template id="tpl-checkout">
<div class="page checkout">
  <div class="scan-row">
    <input ref="scan" v-model="scanCode" @keyup.enter="onScan"
           placeholder="掃描條碼或輸入後按 Enter" class="scan-input" autofocus>
    <input v-model="searchQ" @keyup.enter="onSearch" placeholder="關鍵字搜尋商品">
  </div>
  <div v-if="searchResults.length" class="search-pop">
    <div v-for="r in searchResults" :key="r.variant_id" class="search-item"
         @click="addItem(r)">
      {{ r.name }}|{{ attrText(r) }}|
      {{ r.price === null ? '未定價' : r.price + ' 元' }}|庫存 {{ r.stock }}
    </div>
  </div>
  <table>
    <thead><tr><th>商品</th><th>屬性</th><th>單價</th><th>數量</th>
      <th>單品折扣</th><th>小計</th><th></th></tr></thead>
    <tbody>
      <tr v-for="(it, i) in cart" :key="it.variant_id">
        <td>{{ it.name }}</td>
        <td>{{ attrText(it) }}</td>
        <td><input type="number" v-model.number="it.unit_price" min="0" class="w80"></td>
        <td><input type="number" v-model.number="it.qty" min="1" class="w60"
                   @change="it.qty = Math.max(1, Math.floor(it.qty) || 1)"></td>
        <td><input type="number" v-model.number="it.discount" min="0" class="w80"></td>
        <td>{{ it.qty * it.unit_price - it.discount }}</td>
        <td><button @click="cart.splice(i,1)">✕</button></td>
      </tr>
    </tbody>
  </table>
  <div class="pay-panel">
    <label>整單折抵 <input type="number" v-model.number="orderDiscount" min="0" class="w80"></label>
    <label>付款方式
      <select v-model="payment"><option v-for="p in payments" :key="p">{{ p }}</option></select>
    </label>
    <div class="total">應收 {{ total }} 元</div>
    <label>實收 <input type="number" v-model.number="paid" min="0" class="w100"></label>
    <div class="total">找零 {{ Math.max(0, (paid || 0) - total) }} 元</div>
    <button class="primary" :disabled="!cart.length || paid < total"
            @click="checkout">結帳</button>
  </div>
  <div v-if="doneMsg" class="done-msg">{{ doneMsg }}</div>
</div>
</template>
<template id="tpl-receive">
<div class="page">
  <div class="scan-row">
    <input ref="scan" v-model="scanCode" @keyup.enter="onScan"
           placeholder="掃描條碼進貨" class="scan-input">
  </div>
  <div v-if="hit" class="pay-panel">
    <div>{{ hit.name }}|{{ attrText(hit) }}|目前庫存 {{ hit.stock }}</div>
    <label>進貨數量 <input type="number" v-model.number="qty" min="1" class="w80"></label>
    <button class="primary" @click="doReceive">入庫</button>
  </div>
  <div v-if="notFound" class="pay-panel">
    <div>查無條碼「{{ notFound }}」。進貨不建立大產品,請先至商品設定建立大產品與子產品。</div>
    <button class="primary" @click="goSettings">前往商品設定</button>
  </div>
</div>
</template>
<template id="tpl-stocktake">
<div class="page">
  <div v-if="!current">
    <div class="scan-row">
      <input v-model="operator" placeholder="盤點人(選填)">
      <button class="primary" @click="openNew">開新盤點單</button>
    </div>
    <table>
      <thead><tr><th>單號</th><th>開始時間</th><th>狀態</th><th>盤點人</th><th></th></tr></thead>
      <tbody><tr v-for="s in sessions" :key="s.session_id">
        <td>{{ s.session_id }}</td><td>{{ s.started_at }}</td>
        <td>{{ s.status === 'open' ? '進行中' : '已結案' }}</td><td>{{ s.operator }}</td>
        <td><button v-if="s.status==='open'" @click="enter(s.session_id)">續盤</button>
            <button v-else @click="enter(s.session_id)">檢視</button></td>
      </tr></tbody>
    </table>
  </div>
  <div v-else>
    <div class="scan-row">
      <input ref="scan" v-model="scanCode" @keyup.enter="onScan"
             class="scan-input" placeholder="掃描條碼(重複掃自動累加)"
             :disabled="detail.status!=='open'">
      <button @click="current=null; detail=null; reload()">返回列表</button>
      <button class="primary" v-if="detail.status==='open'" @click="close">結案</button>
    </div>
    <table>
      <thead><tr><th>商品</th><th>屬性</th><th>系統量</th><th>實盤量</th><th>差異</th></tr></thead>
      <tbody><tr v-for="it in detail.items" :key="it.variant_id">
        <td>{{ it.name }}</td><td>{{ attrText(it) }}</td>
        <td>{{ it.system_qty }}</td>
        <td><input type="number" v-model.number="it.counted_qty" min="0" class="w80"
                   :disabled="detail.status!=='open'" @change="setCounted(it)"></td>
        <td :class="{neg: it.diff < 0}">{{ it.diff > 0 ? '+' + it.diff : it.diff }}</td>
      </tr></tbody>
    </table>
  </div>
</div>
</template>
<template id="tpl-records">
<div class="page">
  <div class="scan-row">
    <label>起 <input type="date" v-model="dateFrom"></label>
    <label>迄 <input type="date" v-model="dateTo"></label>
    <select v-model="payment"><option value="">全部付款方式</option>
      <option v-for="p in payments" :key="p">{{ p }}</option></select>
    <button class="primary" @click="reload">查詢</button>
    <button @click="exportCsv">匯出 CSV</button>
  </div>
  <div v-if="summary" class="pay-panel">
    <div>{{ dateFrom }} 小結:{{ summary.count }} 筆,共 {{ summary.total }} 元</div>
    <div v-for="(amt, p) in summary.by_payment" :key="p">{{ p }}:{{ amt }} 元</div>
  </div>
  <table>
    <thead><tr><th>編號</th><th>時間</th><th>付款</th><th>整單折抵</th><th>應收</th><th></th></tr></thead>
    <tbody>
      <template v-for="s in sales" :key="s.sale_id">
        <tr>
          <td>{{ s.sale_id }}</td><td>{{ s.ts }}</td><td>{{ s.payment }}</td>
          <td>{{ s.order_discount }}</td><td>{{ s.total }}</td>
          <td><button @click="expanded = expanded===s.sale_id ? null : s.sale_id">
            {{ expanded===s.sale_id ? '收合' : '明細' }}</button></td>
        </tr>
        <tr v-if="expanded===s.sale_id"><td colspan="6">
          <div v-for="it in s.items">
            {{ it.name }}|{{ attrText(it) }}|{{ it.qty }} 件 ×
            {{ it.unit_price }} 元(折 {{ it.discount }})
          </div>
        </td></tr>
      </template>
    </tbody>
  </table>
</div>
</template>
<template id="tpl-catalog">
<div class="page">
  <div class="scan-row">
    <select v-model="fCategory" @change="reload">
      <option :value="null">全部種類</option>
      <option v-for="c in categories" :key="c.category_id" :value="c.category_id">{{ c.name }}</option>
    </select>
    <select v-model="fBrand" @change="reload">
      <option :value="null">全部廠牌</option>
      <option v-for="b in brands" :key="b.brand_id" :value="b.brand_id">{{ b.name }}</option>
    </select>
    <select v-model="fModel" @change="reload">
      <option :value="null">全部型號</option>
      <option v-for="m in models" :key="m.model_id" :value="m.model_id">{{ m.brand_name }} {{ m.alias || m.name }}</option>
    </select>
    <input v-model="q" @keyup.enter="reload" placeholder="關鍵字(名稱／規格),按 Enter">
    <button class="primary" @click="reload">查詢</button>
    <label class="chk"><input type="checkbox" v-model="includeInactive" @change="reload"> 顯示已停用</label>
    <label class="chk"><input type="checkbox" v-model="pending" @change="reload"> 待處理<span v-if="pendingCount" class="badge">{{ pendingCount }}</span></label>
    <button @click="goPage('variant-batch')">新增子產品</button>
  </div>
  <table>
    <thead><tr><th></th><th>名稱</th><th>種類</th><th>廠牌</th>
      <th>子產品數</th><th>狀態</th><th>操作</th></tr></thead>
    <tbody>
      <template v-for="p in products" :key="p.product_id">
        <tr :class="{inactive: !p.active}">
          <td><button @click="toggleExpand(p.product_id)">
            {{ expanded[p.product_id] ? '收合' : '展開' }}</button></td>
          <td>{{ p.name }}</td>
          <td>{{ p.category_name || '—' }}</td>
          <td>{{ p.brand_name || '—' }}</td>
          <td>{{ p.variants.length }}</td>
          <td>{{ p.active ? '啟用' : '已停用' }}</td>
          <td>
            <button @click="editInSettings">至設定修改</button>
            <button @click="toggleProductActive(p)">{{ p.active ? '停用' : '啟用' }}</button>
            <button @click="deleteProduct(p)">刪除</button>
          </td>
        </tr>
        <tr v-if="expanded[p.product_id]">
          <td></td>
          <td colspan="6">
            <table class="sub">
              <thead><tr><th>型號</th><th>規格</th><th>庫存</th><th>條碼</th>
                <th>自身售價</th><th>有效售價</th><th>狀態</th><th>操作</th></tr></thead>
              <tbody>
                <tr v-for="{ v, showModel, rowspan } in groupedVariants(p)" :key="v.variant_id" :class="{inactive: !v.active, editing: editVariant && editVariant.variant_id === v.variant_id}">
                  <td v-if="showModel" :rowspan="rowspan">
                    <template v-if="editVariant && editVariant.variant_id === v.variant_id">
                      <model-picker :models="models" v-model:model_ids="editVariant.model_ids"></model-picker>
                    </template>
                    <template v-else>{{ v.models.length ? v.models.join('、') : '—' }}</template>
                  </td>
                  <td>
                    <template v-if="editVariant && editVariant.variant_id === v.variant_id">
                      <div v-if="v.issues && v.issues.length" class="issue-box">
                        <div class="issue-tag">待處理</div>
                        <div v-for="(it, ii) in v.issues" :key="ii" class="issue-line">{{ issueText(it) }}</div>
                      </div>
                      <attr-fields :fields="fieldsByCat[p.category_id] || []" :options="fieldOptions"
                                   :usage="fieldUsageByCat[p.category_id] || {}"
                                   :attrs="editVariant.attrs" :model-ids="editVariant.model_ids"
                                   tags-style="chips"></attr-fields>
                    </template>
                    <template v-else>
                      {{ attrText(v, '（無規格）') }}
                      <div v-if="v.issues && v.issues.length" class="issue-box">
                        <div class="issue-tag">待處理</div>
                        <div v-for="(it, ii) in v.issues" :key="ii" class="issue-line">{{ issueText(it) }}</div>
                      </div>
                    </template>
                  </td>
                  <td :class="{neg: v.stock < 0}">{{ v.stock }}</td>
                  <td>
                    <template v-if="editVariant && editVariant.variant_id === v.variant_id">
                      <div v-for="b in v.barcodes" :key="b.barcode" class="bc-line">
                        {{ b.barcode }}<span class="bc-tag">{{ b.source === 'factory' ? '' : '(自)' }}</span>
                        <button class="btn-sm danger" @click="removeBarcode(p, b.barcode)">刪</button>
                      </div>
                      <div class="bc-add">
                        <input v-model="bcInput[v.variant_id]" placeholder="原廠條碼" class="w160"
                               @input="bcError[v.variant_id] = ''"
                               @keyup.enter="addFactoryBarcode(p, v)">
                        <div class="bc-add-btns">
                          <button class="btn-sm" @click="addFactoryBarcode(p, v)">新增</button>
                          <button class="btn-sm" @click="addStoreBarcode(p, v)">自取</button>
                        </div>
                      </div>
                      <div v-if="bcError[v.variant_id]" class="bc-err">{{ bcError[v.variant_id] }}</div>
                    </template>
                    <template v-else>
                      <span v-if="mainBarcode(v)" class="bc-line">
                        {{ mainBarcode(v).barcode }}<span class="bc-tag">{{ mainBarcode(v).source === 'store' ? '(自)' : '' }}</span><span
                          v-if="v.barcodes.length > 1" class="bc-more">+{{ v.barcodes.length - 1 }}</span>
                      </span>
                      <button v-else class="btn-sm" @click="addStoreBarcode(p, v)">自取</button>
                    </template>
                  </td>
                  <td>
                    <input v-if="editVariant && editVariant.variant_id === v.variant_id"
                           type="number" v-model.number="editVariant.price" min="0" class="w80">
                    <span v-else>{{ v.price === null ? '—' : v.price }}</span>
                  </td>
                  <td>{{ v.effective_price === null ? '未定價' : v.effective_price }}</td>
                  <td>{{ v.issues && v.issues.length ? '待處理' : (v.active ? '啟用' : '已停用') }}</td>
                  <td>
                    <template v-if="editVariant && editVariant.variant_id === v.variant_id">
                      <button class="btn-sm primary" @click="saveVariant">儲存</button>
                      <button class="btn-sm" @click="editVariant = null">取消</button>
                    </template>
                    <template v-else-if="v.issues && v.issues.length">
                      <button class="btn-sm" @click="startEditVariant(p, v)">編輯</button>
                      <button class="btn-sm" @click="deleteVariant(p, v)">刪除</button>
                    </template>
                    <template v-else>
                      <button class="btn-sm" @click="startEditVariant(p, v)">編輯</button>
                      <button class="btn-sm" @click="toggleVariantActive(p, v)">{{ v.active ? '停用' : '啟用' }}</button>
                      <button class="btn-sm" @click="deleteVariant(p, v)">刪除</button>
                    </template>
                  </td>
                </tr>
                <tr v-if="addingFor === p.product_id">
                  <td colspan="8">
                    <div class="create-form">
                      <h3>新增子產品</h3>
                      <div class="spec-box">
                      <div class="step-title">規格</div>
                      <attr-fields :fields="fieldsByCat[p.category_id] || []" :options="fieldOptions"
                                   :usage="fieldUsageByCat[p.category_id] || {}"
                                   :attrs="newVariant.attrs" :model-ids="newVariant.model_ids"></attr-fields>
                      </div>
                      <div class="step-title">適用手機型號(可略過)</div>
                      <model-picker :models="models" v-model:model_ids="newVariant.model_ids"></model-picker>
                      <label>售價（可留空） <input type="number" v-model.number="newVariant.price" min="0"></label>
                      <label>原廠條碼（可留空） <input v-model="newVariant.barcode"></label>
                      <div>
                        <button class="primary" @click="saveNewVariant(p)">新增</button>
                        <button @click="addingFor = null">取消</button>
                      </div>
                    </div>
                  </td>
                </tr>
                <tr v-if="addingFor !== p.product_id">
                  <td colspan="8"><button @click="startAddVariant(p)">新增子產品</button></td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </template>
    </tbody>
  </table>
  <div v-if="!products.length" class="done-msg" style="background:#6b7280">查無符合的商品。</div>
</div>
</template>
<template id="tpl-variant-batch">
<div class="page">
  <div class="scan-row">
    <button @click="goCatalog">返回商品資料庫</button>
    <select v-model.number="catId" @change="onCategoryChange">
      <option :value="null">選擇種類</option>
      <option v-for="c in categories" :key="c.category_id" :value="c.category_id">{{ c.name }}</option>
    </select>
    <select v-model.number="productId" @change="onProductChange" :disabled="catId==null">
      <option :value="null">選擇大產品</option>
      <option v-for="p in catProducts" :key="p.product_id" :value="p.product_id">{{ p.name }}</option>
    </select>
    <span v-if="catId!=null && !catProducts.length" class="hint">此種類尚無大產品,請先於設定建立。</span>
  </div>

  <template v-if="product">
    <div class="pay-panel">
      共通大產品:{{ product.name }}｜種類 {{ product.category_name || '—' }}｜廠牌
      {{ product.brand_name || '—' }}｜備註 {{ product.note || '—' }}
    </div>

    <div class="create-form">
      <div class="spec-box">
        <div class="step-title">規格</div>
        <attr-fields :fields="formalFields" :options="fieldOptions" :usage="fieldUsage"
                     :attrs="input.attrs" :model-ids="input.model_ids"></attr-fields>
      </div>
      <div v-if="featureField" class="spec-box">
        <div class="step-title">{{ featureField.name }}(選填)</div>
        <tag-selector v-model="input.attrs[featureField.name]" :usage="tagUsage"></tag-selector>
      </div>
      <div v-if="modelMode==='required'" class="spec-box">
        <div class="step-title">適用手機型號</div>
        <model-picker :models="models" v-model:model_ids="input.model_ids"></model-picker>
      </div>
      <div class="scan-row">
        <label>售價 <input type="number" v-model.number="input.price" min="0" class="w100"></label>
        <label>原廠條碼 <input v-model="input.barcode" placeholder="可留空"></label>
        <label class="chk"><input type="checkbox" v-model="input.store"> 配自取碼</label>
        <button class="primary" @click="addDraft">加入預覽</button>
      </div>
    </div>

    <table v-if="drafts.length">
      <thead><tr><th>操作</th><th>規格</th><th>特性詞條</th>
        <th v-if="modelMode==='required'">適用型號</th>
        <th>售價</th><th>條碼</th><th>狀態</th><th>問題</th></tr></thead>
      <tbody>
        <tr v-for="(d, i) in drafts" :key="d.draft_id" :class="{inactive: draftErrors(d).length}">
          <td>
            <button class="btn-sm" @click="openEdit(i)">修改</button>
            <button class="btn-sm danger" @click="removeDraft(i)">刪除</button>
          </td>
          <td>{{ draftSpecText(d) }}</td>
          <td>{{ draftTags(d) || '—' }}</td>
          <td v-if="modelMode==='required'">{{ draftModels(d) || '—' }}</td>
          <td>{{ d.price == null || d.price === '' ? '未定價' : d.price }}</td>
          <td>{{ draftBarcode(d) }}</td>
          <td>啟用</td>
          <td class="neg"><div v-for="msg in draftErrors(d)" :key="msg">{{ msg }}</div></td>
        </tr>
      </tbody>
    </table>

    <div class="scan-row">
      <button v-if="lastDeleted" @click="undoDelete">復原刪除</button>
      <span class="hint">預覽 {{ drafts.length }} 筆</span>
      <button class="primary" :disabled="!drafts.length" @click="commitAll">建立全部子產品</button>
    </div>
    <div v-if="doneMsg" class="done-msg">{{ doneMsg }}</div>
  </template>

  <!-- 修改 draft(單層 popup,深複本;取消/Escape 不影響原 draft)-->
  <div v-if="editing" class="modal-overlay" @click.self="cancelEdit">
    <div class="modal">
      <h3>修改子產品</h3>
      <div class="step-title">規格</div>
      <attr-fields :fields="formalFields" :options="fieldOptions" :usage="fieldUsage"
                   :attrs="editing.draft.attrs" :model-ids="editing.draft.model_ids"></attr-fields>
      <template v-if="featureField">
        <div class="step-title">{{ featureField.name }}</div>
        <tag-selector v-model="editing.draft.attrs[featureField.name]" :usage="tagUsage"></tag-selector>
      </template>
      <template v-if="modelMode==='required'">
        <div class="step-title">適用手機型號</div>
        <model-picker :models="models" v-model:model_ids="editing.draft.model_ids"></model-picker>
      </template>
      <label>售價 <input type="number" v-model.number="editing.draft.price" min="0" class="w100"></label>
      <label>原廠條碼 <input v-model="editing.draft.barcode"></label>
      <label class="chk"><input type="checkbox" v-model="editing.draft.store"> 配自取碼</label>
      <div class="modal-actions">
        <button class="primary" @click="applyEdit">套用</button>
        <button @click="cancelEdit">取消</button>
      </div>
    </div>
  </div>
</div>
</template>
<template id="tpl-settings">
<div class="page">

  <!-- 商品設定:左種類清單、右種類內容 -->
  <div class="prod-settings">
    <aside class="cat-list">
      <div class="cat-list-title">商品種類</div>
      <div v-for="c in categories" :key="c.category_id" class="cat-item"
           :class="{active: c.category_id===selCatId, inactive: !c.active}"
           @click="selectCategory(c)">
        <span class="cat-name">{{ c.name }}</span>
        <span v-if="!c.active" class="tag">停用</span>
      </div>
      <div class="cat-add">
        <input v-model="newCatName" placeholder="新種類名稱" @keyup.enter="addCategory">
        <button class="btn-sm" @click="addCategory">新增種類</button>
      </div>
    </aside>

    <section class="cat-detail" v-if="selectedCat">
      <div class="detail-head">
        <input class="name cat-title" v-model="selectedCat.name"
               @keyup.enter="saveCategoryName(selectedCat)">
        <select :value="selectedCat.model_mode"
                @change="setModelMode(selectedCat, $event.target.value)">
          <option value="hidden">不使用適用型號</option>
          <option value="required">使用適用型號</option>
        </select>
        <button class="btn-sm" @click="saveCategoryName(selectedCat)">儲存名稱</button>
        <button class="btn-sm" @click="toggleCategoryActive(selectedCat)">
          {{ selectedCat.active ? '停用' : '啟用' }}</button>
        <button class="btn-sm danger" @click="deleteCategory(selectedCat)">刪除</button>
      </div>

      <div class="grp-title">子產品規格模板</div>
      <small class="hint">點整列可編輯必填、預設值與選項;特性詞條為固定欄。</small>
      <div class="tpl-list">
        <div v-for="f in templateRows" :key="f.field_id" class="tpl-row"
             :class="{inactive: !f.cf_active, feature: isFeature(f)}"
             @click="openFieldPopup(f)">
          <span class="tpl-name">{{ f.name }}</span>
          <span class="tag">{{ fieldTypeLabel(f.field_type) }}</span>
          <span class="tpl-req">{{ f.required && !isFeature(f) ? '必填' : '選填' }}</span>
          <span class="tpl-def hint" v-if="defaultValueName(f)">預設 {{ defaultValueName(f) }}</span>
          <span class="tag" v-if="isFeature(f)">固定欄</span>
          <span class="tag" v-else-if="!f.cf_active">已停用</span>
        </div>
      </div>
      <button class="btn-sm" @click="openFieldPopup(null)">新增規格</button>
      <div class="detail-line">適用型號:{{ modeLabel(selectedCat.model_mode) }}</div>

      <div class="grp-title" style="margin-top:14px">此種類的大產品</div>
      <table class="big-prod">
        <thead><tr><th>名稱</th><th>廠牌</th><th>子產品</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody>
          <tr v-for="p in bigProducts" :key="p.product_id" :class="{inactive: !p.active}">
            <td>{{ p.name }}</td>
            <td>{{ p.brand_name || '—' }}</td>
            <td>{{ p.variants.length }}</td>
            <td>{{ p.active ? '啟用' : '已停用' }}</td>
            <td>
              <button class="btn-sm" @click="openProductPopup(p)">修改</button>
              <button class="btn-sm" @click="toggleProductActive(p)">
                {{ p.active ? '停用' : '啟用' }}</button>
              <button class="btn-sm danger" @click="deleteProduct(p)">刪除</button>
            </td>
          </tr>
          <tr v-if="!bigProducts.length"><td colspan="5" class="hint">此種類尚無大產品。</td></tr>
        </tbody>
      </table>
      <button class="btn-sm" @click="openProductPopup(null)">新增大產品</button>
    </section>
    <section class="cat-detail" v-else>
      <div class="hint">請於左側選擇或新增商品種類。</div>
    </section>
  </div>

  <!-- 規格模板 popup(單層) -->
  <div v-if="fieldPopup" class="modal-overlay" @click.self="fieldPopup=null">
    <div class="modal">
      <h3>{{ fieldPopup.mode==='new' ? '新增規格' : '修改規格' }}</h3>
      <label>名稱 <input v-model="fieldPopup.name"></label>
      <label>欄位型態
        <select v-model="fieldPopup.field_type">
          <option value="select">下拉選單</option>
          <option value="text">文字</option>
          <option value="multi">複選</option>
        </select>
      </label>
      <label>排序 <input type="number" v-model.number="fieldPopup.sort" min="0" class="w80"></label>
      <label>必填 <input type="checkbox" v-model="fieldPopup.required" :disabled="catHasVariant"></label>
      <small v-if="catHasVariant" class="hint">此種類已有子產品,必填設定暫時鎖定。</small>
      <label>規格狀態
        <select v-model="fieldPopup.active">
          <option :value="true">啟用</option>
          <option :value="false">停用</option>
        </select>
      </label>
      <label v-if="fieldPopup.field_type==='select'">預設值
        <select v-model="fieldPopup.default_option_id">
          <option :value="null">(無)</option>
          <option v-for="o in activeOptions(fieldPopup.field_id)" :key="o.option_id"
                  :value="o.option_id">{{ o.value }}</option>
        </select>
      </label>
      <div v-if="fieldPopup.field_id!=null && ['select','multi','tags'].includes(fieldPopup.field_type)"
           class="opt-block">
        <div class="grp-title">選項</div>
        <div class="inline-add option-add">
          <input v-model="fieldPopup.newOption" placeholder="新增選項" @keyup.enter="addPopupOption">
          <button class="btn-sm" @click="addPopupOption">加入</button>
          <button class="btn-sm" @click="cleanupFieldOptions" title="硬刪使用數為 0 且非預設值的選項">清理未使用選項</button>
        </div>
        <div class="option-list-box">
          <div v-for="o in (tplOptions[fieldPopup.field_id] || [])" :key="o.option_id"
               class="option-row" :class="{inactive: !o.active}">
            <span class="option-value">{{ o.value }}</span>
            <span class="hint">{{ o.usage_count }} 使用中</span>
            <button class="btn-sm danger" @click="deletePopupOption(o)">刪除</button>
          </div>
          <span v-if="!(tplOptions[fieldPopup.field_id] || []).length" class="hint">尚無選項</span>
        </div>
      </div>
      <small v-if="fieldPopup.field_id==null && ['select','multi','tags'].includes(fieldPopup.field_type)"
             class="hint">建立後即可加入選項。</small>
      <div class="modal-actions">
        <button class="primary" @click="savePopupField">儲存</button>
        <button @click="fieldPopup=null">取消</button>
      </div>
    </div>
  </div>

  <!-- 大產品 popup(單層) -->
  <div v-if="prodPopup" class="modal-overlay" @click.self="prodPopup=null">
    <div class="modal">
      <h3>{{ prodPopup.mode==='new' ? '新增大產品' : '修改大產品' }}</h3>
      <label>名稱 <input v-model="prodPopup.name" @input="onProdNameInput"></label>
      <label>廠牌
        <span class="combo">
          <input v-model="prodPopup.brandQuery" placeholder="搜尋或輸入廠牌"
                 @input="onBrandQueryInput" @focus="brandMenuOpen=true" @blur="onBrandBlur">
          <div v-if="brandMenuOpen" class="combo-menu">
            <div v-for="b in filteredBrands" :key="b.brand_id" class="combo-item"
                 @mousedown.prevent="pickBrand(b)">{{ b.name }}</div>
            <div v-if="prodPopup.brandQuery.trim() && !brandExactMatch"
                 class="combo-item combo-add" @mousedown.prevent="addInlineBrand">
              新增「{{ prodPopup.brandQuery.trim() }}」</div>
            <div v-if="!filteredBrands.length && !prodPopup.brandQuery.trim()"
                 class="hint" style="padding:6px">尚無廠牌</div>
          </div>
        </span>
      </label>
      <label>備註 <input v-model="prodPopup.note" placeholder="選填"></label>
      <label v-if="prodPopup.mode==='edit'">狀態
        <select v-model="prodPopup.active">
          <option :value="true">啟用</option>
          <option :value="false">停用</option>
        </select>
      </label>
      <div class="modal-actions">
        <button class="primary" @click="saveProduct">儲存</button>
        <button @click="prodPopup=null">取消</button>
      </div>
    </div>
  </div>

  <!-- 卡片二:廠牌 -->
  <div class="card">
    <div class="card-head"><h3>廠牌</h3>
      <button class="primary" @click="saveAll('brands')">儲存名稱修改</button></div>
    <div class="inline-add add-before-list">
      <input v-model="newItem.brands" placeholder="新廠牌名稱" @keyup.enter="addItem('brands')">
      <input class="w60" v-model="newSeq.brands" placeholder="序號">
      <button class="primary" @click="addItem('brands')">新增</button>
    </div>
    <sortable-list :items="brands" item-key="brand_id"
                   @save="saveSort('brands', $event)">
      <template #row="{ item: b }">
        <input class="name" v-model="b.name">
        <button @click="deleteItem('brands', b)">刪除</button>
        <button @click="openBrandEditor(b)">{{ openBrand===b.brand_id ? '收合' : '配件種類' }}</button>
      </template>
      <template #detail="{ item: b }">
        <div v-if="openBrand === b.brand_id" class="detail-panel maint-detail">
          <div class="step-title">「{{ openBrandName }}」經營的配件種類</div>
          <small class="hint">勾選後,建檔時選到該種類才會出現此廠牌。</small>
          <label v-for="c in categories" :key="c.category_id" class="chk">
            <input type="checkbox" :checked="brandCatChecked[c.category_id]"
                   @change="toggleBrandCat(c)"> {{ c.name }}
          </label>
        </div>
      </template>
    </sortable-list>
  </div>

  <!-- 卡片三:手機品牌與型號 -->
  <div class="card">
    <div class="card-head"><h3>手機品牌</h3>
      <button class="primary" @click="saveAll('phoneBrands')">儲存名稱修改</button></div>
    <div class="inline-add add-before-list">
      <input v-model="newItem.phoneBrands" placeholder="新手機品牌名稱(如 iPhone)"
             @keyup.enter="addItem('phoneBrands')">
      <input class="w60" v-model="newSeq.phoneBrands" placeholder="序號">
      <button class="primary" @click="addItem('phoneBrands')">新增</button>
    </div>
    <sortable-list :items="phoneBrands" item-key="phone_brand_id"
                   @save="saveSort('phoneBrands', $event)">
      <template #row="{ item: pb }">
        <input class="name" v-model="pb.name">
        <button @click="toggleActive('phoneBrands', pb)">{{ pb.active ? '停用' : '啟用' }}</button>
        <button @click="deleteItem('phoneBrands', pb)">刪除</button>
      </template>
    </sortable-list>

    <div class="card-head" style="margin-top:16px"><h3>手機型號</h3>
      <button class="primary" @click="saveAll('models')">儲存名稱修改</button></div>
    <div class="inline-add add-before-list">
      <select v-model.number="newModel.phone_brand_id">
        <option :value="null">選擇手機品牌</option>
        <option v-for="pb in phoneBrands" :key="pb.phone_brand_id"
                :value="pb.phone_brand_id">{{ pb.name }}</option>
      </select>
      <input v-model="newModel.name" placeholder="型號名稱" @keyup.enter="addModel">
      <input class="w120" v-model="newModel.series" placeholder="系列(選填)" @keyup.enter="addModel">
      <input class="w60" v-model="newSeq.models" placeholder="序號">
      <button class="primary" @click="addModel">新增</button>
    </div>
    <div v-for="g in modelGroups" :key="g.brand" class="model-group">
      <div class="grp-title">{{ g.brand }}</div>
      <sortable-list :items="g.items" item-key="model_id"
                     @save="saveSort('models', $event)">
        <template #row="{ item: m }">
          <input class="name" v-model="m.name">
          <input class="w120" v-model="m.alias" placeholder="別名(選填)">
          <input class="w120" v-model="m.series" placeholder="系列(選填)">
          <button @click="toggleActive('models', m)">{{ m.active ? '停用' : '啟用' }}</button>
          <button @click="deleteItem('models', m)">刪除</button>
        </template>
      </sortable-list>
    </div>
  </div>

</div>
</template>
<script src="js/vue.global.prod.js?v=55"></script>
<script src="js/api.js?v=55"></script>
<script src="js/catalogfields.js?v=55"></script>
<script src="js/checkout.js?v=55"></script>
<script src="js/receive.js?v=55"></script>
<script src="js/stocktake.js?v=55"></script>
<script src="js/records.js?v=55"></script>
<script src="js/catalog.js?v=55"></script>
<script src="js/variant_batch.js?v=55"></script>
<script src="js/sortable.js?v=55"></script>
<script src="js/modelpicker.js?v=55"></script>
<script src="js/attrfields.js?v=55"></script>
<script src="js/settings.js?v=55"></script>
<script src="js/app.js?v=55"></script>
</body>
</html>
